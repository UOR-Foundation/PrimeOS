name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build library
        run: npm run build
        
      - name: Run tests
        run: npm test
        
      - name: Generate API documentation
        run: |
          # Create API documentation directory if it doesn't exist
          mkdir -p docs/api
          # Use JSDoc to generate API documentation
          npx jsdoc -c jsdoc.config.json -d docs/api src/*.js
        
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          
      - name: Install Jekyll dependencies
        run: |
          cd docs
          gem install bundler
          bundle init
          echo "gem 'jekyll', '~> 4.2'" >> Gemfile
          echo "gem 'jekyll-theme-cayman'" >> Gemfile
          echo "gem 'jekyll-relative-links'" >> Gemfile
          echo "gem 'jekyll-seo-tag'" >> Gemfile
          echo "gem 'jekyll-sitemap'" >> Gemfile
          bundle install
          
      - name: Build Jekyll site
        run: |
          cd docs
          bundle exec jekyll build
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/_site
          clean: true