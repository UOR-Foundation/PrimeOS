<?xml version="1.0" encoding="UTF-8"?>
<svg width="48px" height="48px" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <title>App Factory</title>
  <g fill="none" fill-rule="evenodd">
    <rect fill="#6200EA" x="0" y="0" width="48" height="48" rx="8"/>
    <g transform="translate(8, 8)" fill="#FFFFFF">
      <!-- Factory building -->
      <path d="M28,32 L4,32 L4,10 L12,4 L20,10 L20,14 L28,10 L28,32 Z" fill-opacity="0.9"/>
      <!-- Windows -->
      <rect x="8" y="14" width="4" height="4" fill="#6200EA"/>
      <rect x="16" y="14" width="4" height="4" fill="#6200EA"/>
      <rect x="8" y="22" width="4" height="4" fill="#6200EA"/>
      <rect x="16" y="22" width="4" height="4" fill="#6200EA"/>
      <rect x="24" y="14" width="4" height="4" fill="#6200EA"/>
      <rect x="24" y="22" width="4" height="4" fill="#6200EA"/>
      <!-- Chimney -->
      <rect x="22" y="2" width="6" height="8" fill-opacity="0.9"/>
      <!-- Smoke -->
      <circle cx="25" cy="1" r="1" fill-opacity="0.6"/>
      <circle cx="27" cy="0" r="1.5" fill-opacity="0.5"/>
      <circle cx="30" cy="1" r="2" fill-opacity="0.4"/>
      <!-- Code/app symbol -->
      <path d="M16,28 L12,24 L16,20 M20,28 L24,24 L20,20" stroke="#6200EA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- AI glow effect -->
    <circle cx="24" cy="24" r="18" fill="#7C4DFF" fill-opacity="0.2"/>
    <circle cx="24" cy="24" r="14" fill="#7C4DFF" fill-opacity="0.1"/>
  </g>
</svg>