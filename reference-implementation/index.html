<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeOS Reference Implementation</title>
    <link rel="stylesheet" href="css/styles.css">
    <meta name="description" content="The PrimeOS Reference Implementation - A practical operating system built on mathematical coherence">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div id="loading">
        <div class="loading-content">
            <div class="logo">PrimeOS</div>
            <div class="loader">
                <div class="loader-bar"></div>
            </div>
            <div class="loading-text">Initializing system components...</div>
        </div>
    </div>

    <script src="primeos.min.js"></script>
    <script src="js/framework.js"></script>
    <script src="js/components.js"></script>
    <script src="js/visualization.js"></script>
    <script src="core/storage/primestore.js"></script>
    <script src="core/identity/identity-provider.js"></script>
    <!-- Load the AppAPI module to make it available globally -->
    <script src="core/apps/app-api.js"></script>
    <script>
      // Force a full page load to ensure all scripts are loaded
      document.addEventListener('DOMContentLoaded', function() {
        // Make sure constructors exist before use
        if (typeof PrimeStore !== 'function') {
          console.error('PrimeStore is not a constructor function. Type:', typeof PrimeStore);
        }
        
        if (typeof PrimeIdentity !== 'function') {
          console.error('PrimeIdentity is not a constructor function. Type:', typeof PrimeIdentity);
        }
        
        // Initialize PrimeOS namespace if not already present
        if (!window.PrimeOS) {
          window.PrimeOS = {};
        }
      });
    </script>
    <script type="module">
      // Import shell implementation
      import { initializeShell, getShell } from './core/shell/index.js';
      
      // Make available to window
      window.initializeShell = initializeShell;
      window.getShell = getShell;
      
      // Import app
      import './js/app.js';
    </script>
</body>
</html>
