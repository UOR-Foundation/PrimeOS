<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimeOS Shell Test Page</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../core/shell/shell.css">
  <style>
    /* Additional test-specific styles */
    .test-controls {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border-radius: 5px;
      color: white;
      z-index: 10000;
    }
    
    .test-button {
      background: #5c6bc0;
      color: white;
      border: none;
      padding: 8px 12px;
      margin: 5px 0;
      border-radius: 4px;
      cursor: pointer;
      display: block;
      width: 100%;
    }
    
    .test-button:hover {
      background: #3949ab;
    }
    
    #test-results {
      margin-top: 10px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .test-success {
      color: #4caf50;
    }
    
    .test-failure {
      color: #f44336;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-content">
      <div class="logo">PrimeOS</div>
      <div class="loader">
        <div class="loader-bar"></div>
      </div>
      <div class="loading-text">Testing shell environment...</div>
    </div>
  </div>
  
  <div class="test-controls">
    <h3>Test Controls</h3>
    <button id="test-notification" class="test-button">Test Notification</button>
    <button id="test-window" class="test-button">Create Window</button>
    <button id="test-component" class="test-button">Test Component</button>
    <button id="run-all-tests" class="test-button">Run All Tests</button>
    <div id="test-results"></div>
  </div>
  
  <script src="../primeos.min.js"></script>
  <script src="../js/framework.js"></script>
  <script src="../js/components.js"></script>
  <script type="module">
    import { initializeShell } from '../core/shell/index.js';
    
    // Store test results
    const testResults = {
      passed: 0,
      failed: 0,
      logs: []
    };
    
    // Log function for tests
    function logTestResult(testName, passed, message) {
      const resultEl = document.getElementById('test-results');
      const timestamp = new Date().toISOString().substring(11, 19);
      
      if (passed) {
        testResults.passed++;
        testResults.logs.push(`[PASS] ${testName}: ${message || 'Test passed'}`);
        resultEl.innerHTML += `<div class="test-success">[${timestamp}] ✅ ${testName}</div>`;
      } else {
        testResults.failed++;
        testResults.logs.push(`[FAIL] ${testName}: ${message || 'Test failed'}`);
        resultEl.innerHTML += `<div class="test-failure">[${timestamp}] ❌ ${testName}: ${message}</div>`;
      }
      
      // Auto-scroll to bottom
      resultEl.scrollTop = resultEl.scrollHeight;
      
      // Make results available to window for test harness
      window._testResults = testResults;
    }
    
    // Initialize Shell
    let shell;
    
    async function initializeTestEnvironment() {
      try {
        // Update loading bar to simulate real initialization
        const loaderBar = document.querySelector('.loader-bar');
        loaderBar.style.width = '0%';
        
        // Update loading text
        const loadingText = document.querySelector('.loading-text');
        
        // Animate loader
        for (let i = 0; i <= 100; i += 10) {
          loaderBar.style.width = `${i}%`;
          loadingText.textContent = `Initializing test environment... ${i}%`;
          await new Promise(resolve => setTimeout(resolve, 100));
        }
        
        // Initialize the shell
        shell = await initializeShell();
        
        // Hide loading screen
        const loadingScreen = document.getElementById('loading');
        loadingScreen.style.opacity = '0';
        setTimeout(() => {
          loadingScreen.style.display = 'none';
        }, 300);
        
        // Setup test event handlers
        setupTestControls();
        
        // Log initialization success
        console.log('Shell initialized successfully for testing');
        logTestResult('ShellInitialization', true, 'Shell initialized successfully');
        
        // Check for basic shell components
        testShellComponents();
      } catch (error) {
        console.error('Failed to initialize shell for testing:', error);
        logTestResult('ShellInitialization', false, error.message);
        
        // Show error in loading screen
        const loadingText = document.querySelector('.loading-text');
        loadingText.textContent = `Error: ${error.message}`;
        loadingText.style.color = 'red';
      }
    }
    
    function setupTestControls() {
      // Test notification button
      document.getElementById('test-notification').addEventListener('click', testNotification);
      
      // Test window button
      document.getElementById('test-window').addEventListener('click', testWindow);
      
      // Test component button
      document.getElementById('test-component').addEventListener('click', testComponent);
      
      // Run all tests button
      document.getElementById('run-all-tests').addEventListener('click', runAllTests);
    }
    
    function testShellComponents() {
      try {
        // Check desktop exists
        const desktop = document.getElementById('desktop');
        if (!desktop) throw new Error('Desktop not found');
        
        // Check taskbar exists
        const taskbar = document.getElementById('taskbar');
        if (!taskbar) throw new Error('Taskbar not found');
        
        // Check app launcher exists
        const appLauncher = document.getElementById('app-launcher');
        if (!appLauncher) throw new Error('App launcher not found');
        
        // Check notification center exists
        const notificationCenter = document.getElementById('notification-center');
        if (!notificationCenter) throw new Error('Notification center not found');
        
        // Log success
        logTestResult('ShellComponents', true, 'All shell components found');
      } catch (error) {
        logTestResult('ShellComponents', false, error.message);
      }
    }
    
    function testNotification() {
      try {
        // Create a test notification
        const notification = {
          type: 'info',
          title: 'Test Notification',
          message: 'This is a test notification from the test harness',
          timeout: 3000
        };
        
        // Show notification using the EventBus
        window.Prime.EventBus.publish('shell:show-notification', notification);
        
        // Log success
        logTestResult('NotificationSystem', true, 'Notification created successfully');
      } catch (error) {
        logTestResult('NotificationSystem', false, error.message);
      }
    }
    
    function testWindow() {
      try {
        // Create a test window by launching a fake app
        window.Prime.EventBus.publish('shell:launch-app', { 
          appId: 'test-app'
        });
        
        // Log success
        logTestResult('WindowSystem', true, 'Window creation event published');
      } catch (error) {
        logTestResult('WindowSystem', false, error.message);
      }
    }
    
    function testComponent() {
      try {
        // Create a test component using the component system
        const component = window.Prime.createComponent({
          id: 'test-component',
          variant: {
            count: 0,
            label: 'Test Component'
          },
          invariant: {
            increment: function() {
              this.variant.count++;
              return this.variant.count;
            },
            render: function() {
              // Just a test, no actual rendering
              console.log(`Component rendered with count: ${this.variant.count}`);
              return true;
            }
          }
        });
        
        // Test component methods
        const initialCount = component.variant.count;
        const newCount = component.invariant.increment.call(component);
        component.invariant.render.call(component);
        
        // Validate component behavior
        if (initialCount === 0 && newCount === 1) {
          logTestResult('ComponentSystem', true, 'Component created and methods working');
        } else {
          throw new Error('Component state not updating correctly');
        }
      } catch (error) {
        logTestResult('ComponentSystem', false, error.message);
      }
    }
    
    async function runAllTests() {
      // Reset results display
      document.getElementById('test-results').innerHTML = '';
      testResults.passed = 0;
      testResults.failed = 0;
      testResults.logs = [];
      
      // Run each test with a small delay
      await testShellComponents();
      await new Promise(resolve => setTimeout(resolve, 500));
      
      await testNotification();
      await new Promise(resolve => setTimeout(resolve, 500));
      
      await testWindow();
      await new Promise(resolve => setTimeout(resolve, 500));
      
      await testComponent();
      
      // Log final results
      console.log(`Test Results: ${testResults.passed} passed, ${testResults.failed} failed`);
    }
    
    // Initialize when the page loads
    document.addEventListener('DOMContentLoaded', initializeTestEnvironment);
    
    // Make test functions available globally for external automation
    window._testFunctions = {
      testNotification,
      testWindow,
      testComponent,
      runAllTests
    };
  </script>
</body>
</html>
