<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimeOS SecureVault Browser Tests</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background-color: #f0f2f5;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      padding-bottom: 10px;
    }
    .test-container {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 20px;
      margin-bottom: 20px;
    }
    .test-results {
      margin-top: 20px;
      background-color: #f8f9fa;
      border-radius: 4px;
      padding: 15px;
      white-space: pre-wrap;
      font-family: monospace;
      max-height: 300px;
      overflow-y: auto;
    }
    .success {
      color: #27ae60;
    }
    .error {
      color: #e74c3c;
    }
    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <h1>PrimeOS SecureVault Browser Tests</h1>
  
  <div class="test-container">
    <h2>SecureVault Event Notification Tests</h2>
    <p>This test verifies that the SecureVault component properly publishes events when secrets are stored, retrieved, and deleted.</p>
    <button id="run-tests">Run SecureVault Tests</button>
    <div class="test-results" id="test-results">Test results will appear here...</div>
  </div>

  <script src="../primeos.min.js"></script>
  <script>
    // Test results tracking
    const testResults = {
      passed: 0,
      failed: 0,
      logs: []
    };

    // Logger function
    function log(message, isError = false) {
      const timestamp = new Date().toISOString().substring(11, 19);
      const formattedMessage = `[${timestamp}] ${message}`;
      
      testResults.logs.push(formattedMessage);
      
      const resultsElement = document.getElementById('test-results');
      const messageElement = document.createElement('div');
      messageElement.textContent = formattedMessage;
      messageElement.className = isError ? 'error' : '';
      resultsElement.appendChild(messageElement);
      
      if (isError) {
        testResults.failed++;
        console.error(message);
      }
    }

    function logSuccess(testName, message) {
      testResults.passed++;
      log(`✅ ${testName}: ${message}`, false);
    }

    function logFailure(testName, message) {
      testResults.failed++;
      log(`❌ ${testName}: ${message}`, true);
    }

    // Mock objects
    const mockStorage = {
      setItem: function(key, value) {
        log(`Storage: setItem called with key ${key}`);
        return Promise.resolve();
      },
      getItem: function(key) {
        log(`Storage: getItem called with key ${key}`);
        if (key === 'secure_test_key') {
          return Promise.resolve(JSON.stringify({
            encrypted: 'mock-encrypted-data',
            iv: 'mock-iv'
          }));
        }
        return Promise.resolve(null);
      },
      removeItem: function(key) {
        log(`Storage: removeItem called with key ${key}`);
        return Promise.resolve();
      }
    };

    const mockCrypto = {
      encrypt: function(data) {
        log(`Crypto: encrypt called with data ${data}`);
        return Promise.resolve({
          encrypted: 'mock-encrypted-data',
          iv: 'mock-iv'
        });
      },
      decrypt: function(data) {
        log(`Crypto: decrypt called with data ${JSON.stringify(data)}`);
        return Promise.resolve('secret_value');
      }
    };

    // SecureVault test implementation
    class SecureVaultTester {
      constructor() {
        this.eventBus = null;
        this.secureVault = null;
        this.eventsCaptured = [];
      }

      async setup() {
        try {
          // Clear test results
          document.getElementById('test-results').innerHTML = '';
          testResults.passed = 0;
          testResults.failed = 0;
          testResults.logs = [];
          
          log('Setting up SecureVault test environment...');
          
          // Create a test event bus
          this.eventBus = {
            publish: (channel, data) => {
              log(`EventBus: publish called on channel ${channel}`);
              this.eventsCaptured.push({ channel, data });
            },
            subscribe: () => {
              return { unsubscribe: () => {} };
            }
          };

          // Create SecureVault with mocks
          this.secureVault = {
            storage: mockStorage,
            crypto: mockCrypto,
            eventBus: this.eventBus,
            _keyPrefix: 'secure_',
            
            storeSecret: async function(key, value) {
              const prefixedKey = this._keyPrefix + key;
              const encryptedData = await this.crypto.encrypt(value);
              await this.storage.setItem(prefixedKey, JSON.stringify(encryptedData));
              this._notifySecretEvent('store', key);
              return true;
            },
            
            getSecret: async function(key) {
              const prefixedKey = this._keyPrefix + key;
              const storedData = await this.storage.getItem(prefixedKey);
              
              if (!storedData) {
                return null;
              }
              
              const parsedData = JSON.parse(storedData);
              const decryptedValue = await this.crypto.decrypt(parsedData);
              this._notifySecretEvent('get', key);
              return decryptedValue;
            },
            
            deleteSecret: async function(key) {
              const prefixedKey = this._keyPrefix + key;
              await this.storage.removeItem(prefixedKey);
              this._notifySecretEvent('delete', key);
              return true;
            },
            
            _notifySecretEvent: function(action, key) {
              this.eventBus.publish('secure-vault:event', {
                action: action,
                key: key,
                timestamp: new Date().toISOString()
              });
            }
          };
          
          logSuccess('Setup', 'SecureVault test environment initialized');
          return true;
        } catch (error) {
          logFailure('Setup', `Failed to initialize SecureVault: ${error.message}`);
          console.error(error);
          return false;
        }
      }

      async runTests() {
        try {
          // Setup the test environment
          const setupSuccess = await this.setup();
          if (!setupSuccess) return;
          
          // Test 1: Store Secret
          log('\nRunning Test 1: Store Secret');
          this.eventsCaptured = [];
          await this.secureVault.storeSecret('test_key', 'secret_value');
          
          // Verify event was published
          if (this.eventsCaptured.length === 1 && 
              this.eventsCaptured[0].channel === 'secure-vault:event' && 
              this.eventsCaptured[0].data.action === 'store' &&
              this.eventsCaptured[0].data.key === 'test_key') {
            logSuccess('StoreSecret', 'Event notification published correctly');
          } else {
            logFailure('StoreSecret', `Event notification incorrect: ${JSON.stringify(this.eventsCaptured)}`);
          }
          
          // Test 2: Get Secret
          log('\nRunning Test 2: Get Secret');
          this.eventsCaptured = [];
          const secret = await this.secureVault.getSecret('test_key');
          
          // Verify result and event
          if (secret === 'secret_value') {
            logSuccess('GetSecret', 'Secret retrieved correctly');
          } else {
            logFailure('GetSecret', `Incorrect secret value: ${secret}`);
          }
          
          if (this.eventsCaptured.length === 1 && 
              this.eventsCaptured[0].channel === 'secure-vault:event' && 
              this.eventsCaptured[0].data.action === 'get' &&
              this.eventsCaptured[0].data.key === 'test_key') {
            logSuccess('GetSecret', 'Event notification published correctly');
          } else {
            logFailure('GetSecret', `Event notification incorrect: ${JSON.stringify(this.eventsCaptured)}`);
          }
          
          // Test 3: Delete Secret
          log('\nRunning Test 3: Delete Secret');
          this.eventsCaptured = [];
          await this.secureVault.deleteSecret('test_key');
          
          // Verify event was published
          if (this.eventsCaptured.length === 1 && 
              this.eventsCaptured[0].channel === 'secure-vault:event' && 
              this.eventsCaptured[0].data.action === 'delete' &&
              this.eventsCaptured[0].data.key === 'test_key') {
            logSuccess('DeleteSecret', 'Event notification published correctly');
          } else {
            logFailure('DeleteSecret', `Event notification incorrect: ${JSON.stringify(this.eventsCaptured)}`);
          }
          
          // Test 4: _notifySecretEvent Method
          log('\nRunning Test 4: _notifySecretEvent Method');
          this.eventsCaptured = [];
          this.secureVault._notifySecretEvent('custom', 'custom_key');
          
          if (this.eventsCaptured.length === 1 && 
              this.eventsCaptured[0].channel === 'secure-vault:event' && 
              this.eventsCaptured[0].data.action === 'custom' &&
              this.eventsCaptured[0].data.key === 'custom_key') {
            logSuccess('NotifySecretEvent', 'Event notification method works correctly');
          } else {
            logFailure('NotifySecretEvent', `Event notification incorrect: ${JSON.stringify(this.eventsCaptured)}`);
          }
          
          // Summary
          log(`\nTest Summary: ${testResults.passed} passed, ${testResults.failed} failed`);
          if (testResults.failed === 0) {
            log('✅ All SecureVault event notification tests passed!', false);
          } else {
            log('❌ Some SecureVault event notification tests failed.', true);
          }
          
          // Make results available to the window for Puppeteer to access
          window._svTestResults = testResults;
        } catch (error) {
          logFailure('TestExecution', `Test execution failed: ${error.message}`);
          console.error(error);
        }
      }
    }

    // Initialize and run tests when button is clicked
    document.getElementById('run-tests').addEventListener('click', async () => {
      const tester = new SecureVaultTester();
      await tester.runTests();
    });
    
    // Make test runner available to window for Puppeteer to access
    window._secureVaultTester = {
      runTests: async () => {
        const tester = new SecureVaultTester();
        await tester.runTests();
      }
    };
  </script>
</body>
</html>
